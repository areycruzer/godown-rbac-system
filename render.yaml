databases:
  - name: godown-db
    databaseName: godown
    user: godown_user
    plan: free

services:
  - type: web
    name: godown-web
    env: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: godown-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: godown-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: CORS_ALLOWED_ORIGINS
        value: "http://localhost:3000,http://localhost:8000"

  - type: worker
    name: godown-worker
    env: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "celery -A config worker --loglevel=info"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: godown-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: godown-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"

  - type: redis
    name: godown-redis
    plan: free
    ipAllowList: [] # Only allow internal traffic
